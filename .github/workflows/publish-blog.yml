name: Publicar blog (Sanity → web)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-publish]
  push:
    branches: [main]
    paths:
      - "_cms/**"
      - ".github/workflows/publish-blog.yml"

permissions:
  contents: write

jobs:
  build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias del motor
        working-directory: _cms
        run: npm ci

      - name: Generar el blog desde Sanity
        working-directory: _cms
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: production
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: node build.mjs --source=sanity --out=..

      - name: Guardar cambios (Cloudflare despliega solo con el push)
        run: |
          git config user.name "blacknova-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar."
          else
            git commit -m "Rebuild blog desde Sanity"
            git push
          fi
