name: Deploy Blogs Automatico

on:
  schedule:
    - cron: '0 8 * * *'  # cada día a las 8:00 AM (hora UTC)
  push:
    branches: [main]
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copiar blogs a blacknova-deploy
        run: |
          cp blog.html blacknova-deploy/blog.html
          cp -r blog_articles blacknova-deploy/blog_articles
          cp faq.html blacknova-deploy/faq.html
          cp talentos.html blacknova-deploy/talentos.html
          cp sitemap.xml blacknova-deploy/sitemap.xml
          cp logo_blacknova.jpeg blacknova-deploy/logo_blacknova.jpeg

      - name: Commit y push si hay cambios
        run: |
          git config user.name "Blacknova Bot"
          git config user.email "brunasuau@gmail.com"
          git add blacknova-deploy/
          git diff --staged --quiet || git commit -m "Deploy automatico blogs $(date +'%Y-%m-%d')"
          git push
